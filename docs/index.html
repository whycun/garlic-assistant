<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a5276">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="蒜来宝">
  <meta name="description" content="大蒜经营助手 - 行情监控、库存管理、利润计算">
  <title>蒜来宝 - 大蒜经营助手</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧄</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
</head>
<body>

<div id="app-shell">
  <!-- ===== 安装横幅 ===== -->
  <div class="install-banner hidden" id="install-banner">
    <span>📲 添加到主屏幕，使用更方便</span>
    <button class="close-banner" id="close-banner-btn">&times;</button>
  </div>

  <!-- ===== 状态栏 ===== -->
  <div class="status-bar">
    <span class="title">🧄 蒜来宝</span>
    <span class="refresh-indicator" id="refresh-btn" onclick="refreshCurrentPage()">🔄</span>
  </div>

  <!-- ===== 下拉刷新指示器 ===== -->
  <div class="pull-indicator">↓ 下拉刷新</div>

  <!-- ===== 内容区 ===== -->
  <div class="page-content" id="page-content">
    <!-- 首页：资讯流 -->
    <div class="page active" id="page-home"></div>

    <!-- 行情：价格趋势 + 产区报价 -->
    <div class="page" id="page-market"></div>

    <!-- 库存：批次管理 + 计算器 -->
    <div class="page" id="page-inventory"></div>

    <!-- 我的：账户 + 设置 -->
    <div class="page" id="page-me"></div>
  </div>

  <!-- ===== 底部导航 ===== -->
  <nav class="bottom-nav">
    <div class="nav-item active" data-page="home" onclick="switchPage('home')">
      <span class="icon">📰</span>首页
    </div>
    <div class="nav-item" data-page="market" onclick="switchPage('market')">
      <span class="icon">📊</span>行情
    </div>
    <div class="nav-item" data-page="inventory" onclick="switchPage('inventory')">
      <span class="icon">📦</span>库存
    </div>
    <div class="nav-item" data-page="me" onclick="switchPage('me')">
      <span class="icon">👤</span>我的
    </div>
  </nav>
</div>

<!-- ===== 应用脚本 ===== -->
<script type="module" src="js/app.js"></script>
</body>
</html>
